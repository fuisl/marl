# =============================================================
# Environment configuration (config group: env)
# =============================================================
# Path to SUMO network and route files.
# Generate with: python scripts/build_network.py
# 5×5 grid (25 TLS intersections), 2 lanes, 200 m edges
net_file: nets/grid5x5/grid5x5.net.xml
route_file: nets/grid5x5/grid5x5.rou.xml

# Decision interval (simulation seconds between RL decisions)
delta_t: 10
begin_time: 0
end_time: 3600

# SUMO binary — use "sumo-gui" for visual debugging
sumo_binary: sumo
gui: false

# Additional SUMO input files (e.g. detector definitions)
additional_files: null

# Graph construction mode:
#   - original: immediate TLS-to-TLS adjacency only
#   - walk_to_light: contract through unsignalized nodes until next TLS
#   - all_intersections: every SUMO intersection becomes a graph node
graph_builder_mode: original

# Reward function
reward_mode: pressure_queue
reward_weights:
  pressure: 1.0
  queue: 0.1

# Phase-transition constraints
yellow_duration: 3
all_red_duration: 2
min_green_duration: 10
