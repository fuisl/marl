defaults:
  - env: default
  - model: default
  - _self_

train:
  seed: 42
  episodes: 300
  gamma: 0.99
  batch_size: 64
  replay_capacity: 50000
  warmup: 500
  updates_per_step: 1
  log_interval: 1
  optimizer:
    name: meta_adam
    lr: 3.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 0.0
    amsgrad: false
    meta:
      hyper_lr: 1.0e-7
      min_lr: 1.0e-6
      max_lr: 1.0e-2

wandb:
  enabled: true
  project: marl-traffic-gat
  run_name: null

runtime:
  out_dir: runs/gat_baseline

hydra:
  run:
    dir: .
  output_subdir: null
