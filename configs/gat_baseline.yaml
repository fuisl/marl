defaults:
  - env: default
  - model: default
  - _self_

train:
  seed: 42
  episodes: 300
  lr: 3.0e-4
  gamma: 0.99
  batch_size: 64
  replay_capacity: 50000
  warmup: 500
  updates_per_step: 1
  log_interval: 10

wandb:
  enabled: true
  project: marl-traffic-gat
  run_name: null

runtime:
  out_dir: runs/gat_baseline

hydra:
  run:
    dir: .
  output_subdir: null
