seed: 42

optimizer:
  name: meta_adam
  lr: 3.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.0
  amsgrad: false
  meta:
    hyper_lr: 1.0e-7
    min_lr: 1.0e-6
    max_lr: 1.0e-2

gamma: 0.99

replay_capacity: 100000
batch_size: 256

max_epochs: 200
steps_per_epoch: 100
warmup_steps: 1000
updates_per_step: 1
target_update_freq: 1

eval_interval: 10
