# Default model alias: local-neighbor GAT baseline
architecture: local_neighbor_gat_discrete_sac

observation_adapter:
  feature_mode: snapshot

local_encoder_cfg:
  hidden_dim: 64
  out_dim: 48

neighbor_encoder_cfg:
  hidden_dim: 64
  out_dim: 48
  heads: 2
  edge_dim: 2
  dropout: 0.1

fusion_cfg:
  hidden_dim: 96
  out_dim: 64

actor_cfg:
  hidden_dim: 96

critic_cfg:
  hidden_dim: 192

init_alpha: 0.2
tau: 0.005
