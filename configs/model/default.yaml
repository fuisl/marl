# =============================================================
# Model configuration (config group: model)
# =============================================================

# Graph encoder (GATv2Conv)
observation_adapter:
  feature_mode: wave

encoder_cfg:
  hidden_dim: 128
  out_dim: 64
  heads: 4
  edge_dim: 2            # [distance, n_lanes] — set null to ignore edge features
  dropout: 0.0

# Actor head (shared discrete policy)
actor_cfg:
  hidden_dim: 128

# Critic (centralized twin Q-networks)
critic_cfg:
  hidden_dim: 256

# Entropy temperature
init_alpha: 0.2

# Target network soft-update
tau: 0.005
