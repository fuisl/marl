# =============================================================
# Environment configuration
# =============================================================
# Path to SUMO network and route files
# Generated by: python scripts/build_network.py
# 5×5 grid (25 TLS intersections), 2 lanes, 200 m edges
# 130 time-varying flow entries (AM peak, midday, PM peak, etc.)
net_file: "nets/grid5x5/grid5x5.net.xml"
route_file: "nets/grid5x5/grid5x5.rou.xml"

# Decision interval (simulation seconds between RL decisions)
delta_t: 5

# Simulation window
begin_time: 0
end_time: 3600

# SUMO binary — use "sumo-gui" for visual debugging
sumo_binary: "sumo"
gui: false

# Additional SUMO input files (e.g. detector definitions)
additional_files: null

# Reward function
reward_mode: "combined"
reward_weights:
  queue: -0.25
  wait: -0.25
  speed: 0.25
  throughput: 0.25

# Phase-transition constraints
yellow_duration: 3
all_red_duration: 1
min_green_duration: 5
