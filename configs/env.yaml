# =============================================================
# Environment configuration
# =============================================================
# Path to SUMO network and route files
net_file: "nets/grid4x4/grid4x4.net.xml"
route_file: "nets/grid4x4/grid4x4.rou.xml"

# Decision interval (simulation seconds between RL decisions)
delta_t: 5

# Simulation window
begin_time: 0
end_time: 3600

# SUMO binary — use "sumo-gui" for visual debugging
sumo_binary: "sumo"
gui: false

# Additional SUMO input files (e.g. detector definitions)
additional_files: null

# Reward function
reward_mode: "combined"
reward_weights:
  queue: -0.25
  wait: -0.25
  speed: 0.25
  throughput: 0.25

# Phase-transition constraints
yellow_duration: 3
all_red_duration: 1
min_green_duration: 5
