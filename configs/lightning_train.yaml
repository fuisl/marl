defaults:
  - env: default
  - model: default
  - train: lightning
  - _self_

wandb:
  enabled: false
  project: marl-traffic-lightning
  run_name: null
  log_model: false

runtime:
  out_dir: runs/lightning_train
  enable_checkpointing: true
  log_every_n_steps: 1
  accelerator: auto
  devices: 1
  deterministic: false
  csv_logger: true

hydra:
  run:
    dir: .
  output_subdir: null
