defaults:
  - env: sumo
  - scenario: grid5x5
  - model: default
  - _self_

runtime:
  checkpoint_path: null
  out_dir: null
  device: cuda
  use_checkpoint_config: true

analysis:
  num_snapshots: 5
  max_hops: 16
  curve_num_samples: null
  # If true and curve_num_samples is null, use all nodes (official-style default).
  # If false, keep repo's performance-friendly cap for large graphs.
  curve_use_all_nodes_when_null: false
  # seeded_sorted: deterministic and sorted sampled node indices (current repo behavior)
  # official_random: unsorted random order, matching official-style sampling order
  curve_sampling_mode: seeded_sorted
  # Optional base seed for curve sampling. null keeps mode defaults.
  curve_sampling_seed: null
  # Optional log-scale y-axis for influence decay curves.
  curve_log_y: false
  map_num_samples: null
  show_blue_edges_influence_map: false
  # null => global spatial influence over all nodes
  # int  => focal-node view for the chosen source node index
  focal_node_index: null
  show_heat_contours: true
  num_heat_contours: 6
  heat_grid_size: 220
  heat_sigma_scale: 0.06
  heat_percentile_low: 2.0
  heat_percentile_high: 98.0
  # weights used to build smoothed field from node influence values
  # raw | normalized | log_normalized
  heat_weight_mode: raw

hydra:
  run:
    dir: .
  output_subdir: null
